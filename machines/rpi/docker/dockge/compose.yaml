# Dockge — Docker Compose Stack Manager
# Access: https://dockge.<tailnet>.ts.net
#
# File-based compose manager. Stacks directory points to ~/.homelab/
# where the deploy script syncs service directories.
# Dockge can view/deploy stacks; editing happens in the git repo.

services:
  ts-dockge:
    image: tailscale/tailscale:latest
    container_name: ts-dockge
    hostname: dockge
    environment:
      TS_AUTHKEY: ${TS_DOCKER_AUTHKEY}
      TS_EXTRA_ARGS: --advertise-tags=tag:container
      TS_SERVE_CONFIG: /config/serve.json
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
    volumes:
      - ts-dockge-state:/var/lib/tailscale
      - ./ts-config:/config
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    restart: unless-stopped

  dockge:
    image: louislam/dockge:1
    container_name: dockge
    network_mode: service:ts-dockge
    depends_on:
      - ts-dockge
    restart: unless-stopped
    labels:
      - homepage.group=Infrastructure
      - homepage.name=Dockge
      - homepage.icon=mdi-docker
      - homepage.href=https://dockge.${TAILNET_NAME}.ts.net
      - homepage.description=Docker Compose manager
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      - ${MC_HOMELAB_DIR:-${HOME}/.homelab}:${MC_HOMELAB_DIR:-${HOME}/.homelab}
    environment:
      DOCKGE_STACKS_DIR: ${MC_HOMELAB_DIR:-${HOME}/.homelab}

volumes:
  ts-dockge-state:

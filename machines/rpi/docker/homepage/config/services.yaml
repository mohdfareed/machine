---
- Services:
      - KBM Personal:
            icon: mdi-brain
            href: http://{{HOMEPAGE_VAR_HOST}}:8001
            description: Personal knowledge base
            server: docker
            container: kbm-personal
      - KBM Work:
            icon: mdi-brain
            href: http://{{HOMEPAGE_VAR_HOST}}:8002
            description: Work knowledge base
            server: docker
            container: kbm-work
      - KBM Private:
            icon: mdi-brain
            href: http://{{HOMEPAGE_VAR_HOST}}:8003
            description: Private knowledge base
            server: docker
            container: kbm-private
      - Discord-Telegram Bot:
            icon: mdi-robot
            description: Message bridge bot
            server: docker
            container: discord-telegram-bot-bot-1

- Management:
      - Watchtower:
            icon: watchtower
            description: Automatic container updates
            server: docker
            container: watchtower
            widget:
                type: watchtower
                url: http://host.docker.internal:8080
                key: "{{HOMEPAGE_VAR_WATCHTOWER_KEY}}"
                fields:
                    [
                        "containers_scanned",
                        "containers_updated",
                        "containers_failed",
                    ]

- Infrastructure:
      - Tailscale:
            icon: tailscale
            href: https://login.tailscale.com/admin
            description: VPN mesh network
            widget:
                type: tailscale
                deviceid: "{{HOMEPAGE_VAR_TAILSCALE_DEVICE_ID}}"
                key: "{{HOMEPAGE_VAR_TAILSCALE_KEY}}"
                fields: ["address", "last_seen", "expires"]

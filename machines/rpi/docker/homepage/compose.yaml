# Homepage — Homelab Dashboard
# Access via Tailscale Serve at https://<machine>.<tailnet>.ts.net/
#
# Config files are mounted from ./config/.
# Docker integration auto-discovers running containers.

services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      - 127.0.0.1:3000:3000 # loopback only — access via tailscale serve
    volumes:
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      HOMEPAGE_ALLOWED_HOSTS: "*"

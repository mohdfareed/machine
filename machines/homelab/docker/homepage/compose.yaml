# Homepage — Homelab Dashboard
# Access: https://<machine>.<tailnet>.ts.net/
#
# Config files are mounted from ./config/.
# Docker integration auto-discovers running containers.

services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    volumes:
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      HOMEPAGE_ALLOWED_HOSTS: "*"
      HOMEPAGE_VAR_TAILNET_NAME: ${TAILNET_NAME}
      HOMEPAGE_VAR_WATCHTOWER_KEY: ${WATCHTOWER_API_TOKEN}
      HOMEPAGE_VAR_TAILSCALE_DEVICE_ID: ${HOMEPAGE_VAR_TAILSCALE_DEVICE_ID}
      HOMEPAGE_VAR_TAILSCALE_KEY: ${HOMEPAGE_VAR_TAILSCALE_KEY}
      HOMEPAGE_VAR_PORTAINER_KEY: ${HOMEPAGE_VAR_PORTAINER_KEY}
    labels:
      traefik.enable: "true"
      traefik.http.routers.homepage.entrypoints: web
      traefik.http.routers.homepage.rule: PathPrefix(`/`)
      traefik.http.routers.homepage.priority: "1"
      traefik.http.services.homepage.loadbalancer.server.port: "3000"
    networks:
      - traefik

networks:
  traefik:
    external: true

---
# Service widgets shown on the dashboard.

- Services:
    - OpenClaw:
        icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/openclaw.png
        href: https://openclaw.{{HOMEPAGE_VAR_TAILNET_NAME}}.ts.net
        description: Personal AI assistant
        server: docker
        container: openclaw
    - KBM Personal:
        icon: mdi-brain
        href: https://kbm.{{HOMEPAGE_VAR_TAILNET_NAME}}.ts.net/personal
        description: Personal knowledge base
        server: docker
        container: kbm-personal
    - KBM Work:
        icon: mdi-brain
        href: https://kbm.{{HOMEPAGE_VAR_TAILNET_NAME}}.ts.net/work
        description: Work knowledge base
        server: docker
        container: kbm-work
    - KBM Private:
        icon: mdi-brain
        href: https://kbm.{{HOMEPAGE_VAR_TAILNET_NAME}}.ts.net/private
        description: Private knowledge base
        server: docker
        container: kbm-private
    - Discord-Telegram Bot:
        icon: mdi-robot
        href: https://github.com/mohdfareed/discord-telegram-bot
        description: Discord Telegram Bot
        server: docker
        container: discord-telegram-bot

- Infrastructure:
    - Tailscale:
        icon: tailscale
        href: https://login.tailscale.com/admin
        description: VPN mesh network
        widget:
          type: tailscale
          deviceid: "{{HOMEPAGE_VAR_TAILSCALE_DEVICE_ID}}"
          key: "{{HOMEPAGE_VAR_TAILSCALE_KEY}}"
          fields: ["address", "last_seen", "expires"]
    - Dockge:
        icon: dockge
        href: https://dockge.{{HOMEPAGE_VAR_TAILNET_NAME}}.ts.net
        description: Docker Compose manager
        server: docker
        container: dockge

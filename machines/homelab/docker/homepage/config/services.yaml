---
# Service widgets shown on the dashboard.

- Services:
      - OpenClaw:
            icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/openclaw.png
            href: https://homelab.{{HOMEPAGE_VAR_TAILNET_NAME}}.ts.net/openclaw
            description: Personal AI assistant
            server: docker
            container: openclaw
      - KBM Personal:
            icon: mdi-brain
            href: https://github.com/mohdfareed/kbm
            description: Personal knowledge base
            server: docker
            container: kbm-personal
      - KBM Work:
            icon: mdi-brain
            href: https://github.com/mohdfareed/kbm
            description: Work knowledge base
            server: docker
            container: kbm-work
      - KBM Private:
            icon: mdi-brain
            href: https://github.com/mohdfareed/kbm
            description: Private knowledge base
            server: docker
            container: kbm-private
      - Discord-Telegram Bot:
            icon: mdi-robot
            href: https://github.com/mohdfareed/discord-telegram-bot
            description: Discord Telegram Bot
            server: docker
            container: discord-telegram-bot

- Infrastructure:
      - Tailscale:
            icon: tailscale
            href: https://login.tailscale.com/admin
            description: VPN mesh network
            widget:
                type: tailscale
                deviceid: "{{HOMEPAGE_VAR_TAILSCALE_DEVICE_ID}}"
                key: "{{HOMEPAGE_VAR_TAILSCALE_KEY}}"
                fields: ["address", "last_seen", "expires"]
      - Portainer:
            icon: portainer
            href: https://homelab.{{HOMEPAGE_VAR_TAILNET_NAME}}.ts.net/portainer
            description: Container management
            server: docker
            container: portainer
            widget:
                type: portainer
                url: http://host.docker.internal:9000
                env: 3
                key: "{{HOMEPAGE_VAR_PORTAINER_KEY}}"
                fields: ["running", "stopped", "total"]
      - Watchtower:
            icon: watchtower
            description: Automatic container updates
            server: docker
            container: watchtower
            widget:
                type: watchtower
                url: http://host.docker.internal:8080
                key: "{{HOMEPAGE_VAR_WATCHTOWER_KEY}}"
                fields:
                    [
                        "containers_scanned",
                        "containers_updated",
                        "containers_failed",
                    ]

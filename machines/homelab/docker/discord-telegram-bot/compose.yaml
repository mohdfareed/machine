# Discord-Telegram Bot
#
# Env vars (resolved from ~/.env via deploy script):
#   DISCORD_BOT_TOKEN   — Discord bot token
#   TELEGRAM_BOT_TOKEN  — Telegram bot token

services:
  discord-telegram-bot:
    build: https://github.com/mohdfareed/discord-telegram-bot.git
    container_name: discord-telegram-bot
    restart: unless-stopped
    environment:
      DISCORD_BOT_TOKEN: ${DTB_DISCORD_BOT_TOKEN}
      TELEGRAM_BOT_TOKEN: ${DTB_TELEGRAM_BOT_TOKEN}
    volumes:
      - ./data:/app/data
    networks:
      - traefik

networks:
  traefik:
    external: true

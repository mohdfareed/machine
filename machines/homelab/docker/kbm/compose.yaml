# KBM — Knowledge Base Memory
# Instances: personal (8001), work (8002), private (8003)
#
# All persistent data lives under ./data/<hostname>/.
# KBM stores everything under KBM_HOME=/data inside the container.

services:
  kbm-personal:
    image: ghcr.io/mohdfareed/kbm:latest
    container_name: kbm-personal
    restart: unless-stopped
    hostname: personal
    ports:
      - 127.0.0.1:8001:8000 # loopback only — access via tailscale serve
    volumes:
      - ./data/personal:/data

  kbm-work:
    image: ghcr.io/mohdfareed/kbm:latest
    container_name: kbm-work
    restart: unless-stopped
    hostname: work
    ports:
      - 127.0.0.1:8002:8000 # loopback only — access via tailscale serve
    volumes:
      - ./data/work:/data

  kbm-private:
    image: ghcr.io/mohdfareed/kbm:latest
    container_name: kbm-private
    restart: unless-stopped
    hostname: private
    ports:
      - 127.0.0.1:8003:8000 # loopback only — access via tailscale serve
    volumes:
      - ./data/private:/data

# KBM — Knowledge Base Memory
# Access: https://<mc_id>-kbm.<tailnet>.ts.net/{personal,work} (funnel)

services:
  ts-kbm:
    image: tailscale/tailscale:latest
    container_name: ts-kbm
    hostname: kbm
    environment:
      TS_AUTHKEY: ${TS_DOCKER_AUTHKEY}
      TS_EXTRA_ARGS: --advertise-tags=tag:container
      TS_SERVE_CONFIG: /config/serve.json
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
    volumes:
      - ts-kbm-state:/var/lib/tailscale
      - ./ts-config:/config
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    restart: unless-stopped

  kbm-personal:
    image: ghcr.io/mohdfareed/kbm:latest
    container_name: kbm-personal
    network_mode: service:ts-kbm
    depends_on:
      - ts-kbm
    restart: unless-stopped
    volumes:
      - ./data:/data/data
      - ./logs:/data/logs
      - ./config:/data/config:ro
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      KBM_NAME: personal
      KBM_PATH: /personal
      KBM_PORT: "3001"
    labels:
      - homepage.group=Services
      - homepage.name=KBM Personal
      - homepage.icon=mdi-brain
      - homepage.href=https://kbm.${TAILNET_NAME}.ts.net/personal
      - homepage.description=kbm.${TAILNET_NAME}.ts.net/personal

  kbm-work:
    image: ghcr.io/mohdfareed/kbm:latest
    container_name: kbm-work
    network_mode: service:ts-kbm
    depends_on:
      - ts-kbm
    restart: unless-stopped
    volumes:
      - ./data:/data/data
      - ./logs:/data/logs
      - ./config:/data/config:ro
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      KBM_NAME: work
      KBM_PATH: /work
      KBM_PORT: "3002"
    labels:
      - homepage.group=Services
      - homepage.name=KBM Work
      - homepage.icon=mdi-brain
      - homepage.href=https://kbm.${TAILNET_NAME}.ts.net/work
      - homepage.description=kbm.${TAILNET_NAME}.ts.net/work

volumes:
  ts-kbm-state:

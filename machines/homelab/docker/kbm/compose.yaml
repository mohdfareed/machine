# KBM — Knowledge Base Memory
# Access: https://kbm.<tailnet>.ts.net/{personal,work,private} (funnel)
#
# Single Tailscale sidecar with path-based routing to three KBM instances.
# All persistent data lives under ./data/<name>/. KBM_HOME=/data inside each container.

services:
  ts-kbm:
    image: tailscale/tailscale:latest
    container_name: ts-kbm
    hostname: kbm
    environment:
      TS_AUTHKEY: ${TS_DOCKER_AUTHKEY}
      TS_EXTRA_ARGS: --advertise-tags=tag:container
      TS_SERVE_CONFIG: /config/serve.json
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
    volumes:
      - ts-kbm-state:/var/lib/tailscale
      - ./ts-config:/config
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    restart: unless-stopped

  kbm-personal:
    image: ghcr.io/mohdfareed/kbm:latest
    container_name: kbm-personal
    network_mode: service:ts-kbm
    depends_on:
      - ts-kbm
    restart: unless-stopped
    volumes:
      - ./data/personal:/data
    environment:
      KBM_PATH: /personal
      KBM_PORT: "3001"

  kbm-work:
    image: ghcr.io/mohdfareed/kbm:latest
    container_name: kbm-work
    network_mode: service:ts-kbm
    depends_on:
      - ts-kbm
    restart: unless-stopped
    volumes:
      - ./data/work:/data
    environment:
      KBM_PATH: /work
      KBM_PORT: "3002"

  kbm-private:
    image: ghcr.io/mohdfareed/kbm:latest
    container_name: kbm-private
    network_mode: service:ts-kbm
    depends_on:
      - ts-kbm
    restart: unless-stopped
    volumes:
      - ./data/private:/data
    environment:
      KBM_PATH: /private
      KBM_PORT: "3003"

volumes:
  ts-kbm-state:

# OpenClaw — Personal AI Assistant Gateway
# Access: https://<machine>.<tailnet>.ts.net/openclaw
#
# Layout:
#   ./data/           → /home/node/.openclaw                (runtime state, gitignored)
#   ./config/         → /home/node/.openclaw/config.        (config files)
#   ./workspace/      → /home/node/.openclaw/workspace      (persona files)
#   ./openclaw.json   → /home/node/.openclaw/openclaw.json  (main config, $includes below)
#
# Env vars (resolved from ~/.env via deploy script):
#   OPENAI_API_KEY           — model provider / LanceDB embedding
#   TELEGRAM_BOT_TOKEN       — Telegram channel (from @BotFather)
#   TELEGRAM_WEBHOOK_SECRET  — webhook signature secret
#   OPENCLAW_WEBHOOK_URL     — https://<host>.<tailnet>.ts.net:8443/openclaw/telegram
#   OPENCLAW_GATEWAY_TOKEN   — gateway auth token (long random string)

services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    # REVIEW: Check if openai dep is still needed by memory-lancedb plugin.
    command:
      - /bin/sh
      - -c
      - npm install --no-save openai 2>/dev/null;
        exec node dist/index.js gateway
        --bind "$${OPENCLAW_GATEWAY_BIND:-lan}"
        --port 18789
    volumes:
      - ./data:/home/node/.openclaw
      - ./config:/home/node/.openclaw/config:ro
      - ./workspace:/home/node/.openclaw/workspace
      - ./openclaw.json:/home/node/.openclaw/openclaw.json:ro
    environment:
      NODE_ENV: production
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      TELEGRAM_BOT_TOKEN: ${OPENCLAW_TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${OPENCLAW_TELEGRAM_WEBHOOK_SECRET}
      TELEGRAM_WEBHOOK_URL: ${OPENCLAW_TELEGRAM_WEBHOOK_URL}
    labels:
      traefik.enable: "true"
      # Private (tailnet) — Traefik strips /openclaw before forwarding
      traefik.http.routers.openclaw.entrypoints: web
      traefik.http.routers.openclaw.rule: PathPrefix(`/openclaw`)
      traefik.http.routers.openclaw.middlewares: strip-openclaw
      traefik.http.middlewares.strip-openclaw.stripprefix.prefixes: /openclaw
      traefik.http.services.openclaw.loadbalancer.server.port: "18789"
      # Public webhook (internet via tailscale funnel on :8443)
      traefik.http.routers.openclaw-webhook.entrypoints: public
      traefik.http.routers.openclaw-webhook.rule: PathPrefix(`/openclaw`)
      traefik.http.routers.openclaw-webhook.middlewares: strip-openclaw
      traefik.http.routers.openclaw-webhook.service: openclaw
    networks:
      - traefik

networks:
  traefik:
    external: true

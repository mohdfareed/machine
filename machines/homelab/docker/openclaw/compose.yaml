# OpenClaw — Personal AI Assistant Gateway
# Access: https://<mc_id>-openclaw.<tailnet>.ts.net (funnel)

services:
  ts-openclaw:
    image: tailscale/tailscale:latest
    container_name: ts-openclaw
    hostname: openclaw
    environment:
      TS_AUTHKEY: ${TS_DOCKER_AUTHKEY}
      TS_EXTRA_ARGS: --advertise-tags=tag:container
      TS_SERVE_CONFIG: /config/serve.json
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
    volumes:
      - ts-openclaw-state:/var/lib/tailscale
      - ./ts-config:/config
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    restart: unless-stopped

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    # networking
    network_mode: service:ts-openclaw
    depends_on:
      - ts-openclaw
    labels:
      - homepage.group=Services
      - homepage.name=OpenClaw
      - homepage.icon=https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/openclaw.svg
      - homepage.href=https://openclaw.${TAILNET_NAME}.ts.net
      - homepage.description=Personal AI assistant
    # mounting
    volumes:
      - ./data:/home/node/.openclaw
      - ./config:/home/node/.openclaw/config
      - ./workspace:/home/node/.openclaw/workspace
      - ./openclaw.json:/home/node/.openclaw/openclaw.json
      - ./openclaw.sh:/usr/local/bin/openclaw:ro # alias for CLI access
    # env vars
    environment:
      TERM: xterm-256color
      OPENAI_API_KEY: ${OPENAI_API_KEY}         # llm
      BRAVE_API_KEY: ${BRAVE_API_KEY}           # web search
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY} # text-to-speech
      GEMINI_API_KEY: ${GEMINI_API_KEY}         # image generation
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_HOOKS_TOKEN: ${OPENCLAW_HOOKS_TOKEN}
      OPENCLAW_CRON_TOKEN: ${OPENCLAW_CRON_TOKEN}
      TELEGRAM_BOT_TOKEN: ${OPENCLAW_TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${OPENCLAW_TELEGRAM_WEBHOOK_SECRET}
      TELEGRAM_WEBHOOK_URL: ${OPENCLAW_TELEGRAM_WEBHOOK_URL}
    # entrypoint
    init: true
    restart: unless-stopped
    entrypoint: ["openclaw"]
    command: ["gateway"]

volumes:
  ts-openclaw-state:

# OpenClaw — Personal AI Assistant Gateway
# Access: https://<machine>.<tailnet>.ts.net/openclaw

services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    volumes:
      - ./data:/home/node/.openclaw
      - ./config:/home/node/.openclaw/config:ro
      - ./workspace:/home/node/.openclaw/workspace
      - ./openclaw.json:/home/node/.openclaw/openclaw.json:ro
    environment:
      TERM: xterm-256color
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_HOOKS_TOKEN: ${OPENCLAW_HOOKS_TOKEN}
      TELEGRAM_BOT_TOKEN: ${OPENCLAW_TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${OPENCLAW_TELEGRAM_WEBHOOK_SECRET}
      TELEGRAM_WEBHOOK_URL: ${OPENCLAW_TELEGRAM_WEBHOOK_URL}

    labels:
      traefik.enable: "true"
      # Private (tailnet) — Traefik strips /openclaw before forwarding
      traefik.http.routers.openclaw.entrypoints: web
      traefik.http.routers.openclaw.rule: PathPrefix(`/openclaw`)
      traefik.http.routers.openclaw.middlewares: strip-openclaw
      traefik.http.middlewares.strip-openclaw.stripprefix.prefixes: /openclaw
      traefik.http.services.openclaw.loadbalancer.server.port: "18789"
      # Public webhook (internet via tailscale funnel on :8443)
      traefik.http.routers.openclaw-webhook.entrypoints: public
      traefik.http.routers.openclaw-webhook.rule: PathPrefix(`/openclaw`)
      traefik.http.routers.openclaw-webhook.middlewares: strip-openclaw,openclaw-ratelimit
      traefik.http.routers.openclaw-webhook.service: openclaw
      traefik.http.middlewares.openclaw-ratelimit.ratelimit.average: "30"
      traefik.http.middlewares.openclaw-ratelimit.ratelimit.burst: "10"
    networks:
      - traefik

networks:
  traefik:
    external: true

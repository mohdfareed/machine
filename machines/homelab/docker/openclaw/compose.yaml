# OpenClaw - Tailscale ingress sidecar
# Gives the native OpenClaw gateway its own tailnet hostname ("openclaw").
# The gateway itself runs natively on the Mac via launchd.
# Access: https://openclaw.<tailnet>.ts.net

services:
  ts-openclaw:
    image: tailscale/tailscale:latest
    container_name: ts-openclaw
    hostname: openclaw
    environment:
      TS_AUTHKEY: ${TS_DOCKER_AUTHKEY}
      TS_EXTRA_ARGS: --advertise-tags=tag:container
      TS_SERVE_CONFIG: /config/serve.json
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
    volumes:
      - ts-openclaw-state:/var/lib/tailscale
      - ./ts-config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        ["CMD", "wget", "-q", "--spider", "http://host.docker.internal:18789"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    labels:
      - homepage.group=Services
      - homepage.name=OpenClaw
      - homepage.icon=https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/openclaw.svg
      - homepage.href=https://openclaw.${TAILNET_NAME}.ts.net
      - homepage.description=Personal AI assistant
    restart: unless-stopped

volumes:
  ts-openclaw-state:

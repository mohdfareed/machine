# Traefik — Reverse Proxy
# Routes requests to Docker services by path prefix and strips the prefix.
#
# Entrypoints:
#   web    (:7880) → tailscale serve on :443  (private, tailnet-only)
#   public (:7881) → tailscale funnel on :8443 (internet-facing webhooks)
#
# Services opt in via Docker labels (exposedByDefault=false).
# All routable services must join the external `traefik` network.

services:
  traefik:
    image: traefik:v3.3
    container_name: traefik
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --providers.docker.network=traefik
      - --entrypoints.web.address=:7880
      - --entrypoints.public.address=:7881
      - --log.level=WARN
    ports:
      - 127.0.0.1:7880:7880 # private — tailscale serve
      - 127.0.0.1:7881:7881 # public  — tailscale funnel
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik

networks:
  traefik:
    external: true

# Speedtest Tracker with Tailscale
# Access: https://<mc_id>-speedtest.<tailnet>.ts.net

services:
  ts-speedtest:
    image: tailscale/tailscale:latest
    container_name: ts-speedtest
    hostname: ${MC_ID}-speedtest
    environment:
      TS_AUTHKEY: ${TS_DOCKER_AUTHKEY}
      TS_EXTRA_ARGS: --advertise-tags=tag:container
      TS_SERVE_CONFIG: /config/serve.json
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
    volumes:
      - ts-speedtest-state:/var/lib/tailscale
      - ./ts-config:/config
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    restart: unless-stopped

  speedtest:
    image: lscr.io/linuxserver/speedtest-tracker:latest
    container_name: speedtest
    network_mode: service:ts-speedtest
    depends_on:
      - ts-speedtest
    restart: unless-stopped
    labels:
      - homepage.group=Infrastructure
      - homepage.name=Speedtest Tracker
      - homepage.icon=mdi-speedometer
      - homepage.href=https://${MC_ID}-speedtest.${TAILNET_NAME}.ts.net
      - homepage.description=Internet speed monitoring
      - homepage.widget.type=speedtest
      - homepage.widget.url=https://${MC_ID}-speedtest.${TAILNET_NAME}.ts.net
      - homepage.widget.version=2
      - homepage.widget.key=${SPEEDTEST_API_KEY:-}
      - homepage.widget.fields=["download","upload","ping"]
    volumes:
      - ./data/speedtest:/config
    tmpfs:
      - /config/keys
    environment:
      PUID: 1000
      PGID: 1000
      APP_KEY: ${SPEEDTEST_APP_KEY:-}
      APP_URL: "https://${MC_ID}-speedtest.${TAILNET_NAME}.ts.net"
      DB_CONNECTION: sqlite
      # Disable internal HTTPS — Tailscale sidecar handles TLS on :443.
      APP_DISABLE_HTTPS: "true"

volumes:
  ts-speedtest-state:

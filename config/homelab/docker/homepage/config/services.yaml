---
# Non-container service entries. Docker containers are auto-discovered via
# homepage.* labels in their compose files.

- Infrastructure:
    - HomeLab:
        icon: mdi-home-analytics
        href: https://login.tailscale.com/admin
        description: VPN mesh network
        widget:
          type: tailscale
          deviceid: "{{HOMEPAGE_VAR_TAILSCALE_HOMELAB_DEVICE_ID}}"
          key: "{{HOMEPAGE_VAR_TAILSCALE_API_KEY}}"
          fields: ["address", "last_seen", "expires"]
    - RPi:
        icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/raspberry-pi-light.svg
        href: https://rpi.{{HOMEPAGE_VAR_TAILNET_NAME}}.ts.net
        description: VPN mesh network
        widget:
          type: tailscale
          deviceid: "{{HOMEPAGE_VAR_TAILSCALE_RPI_DEVICE_ID}}"
          key: "{{HOMEPAGE_VAR_TAILSCALE_API_KEY}}"
          fields: ["address", "last_seen", "expires"]

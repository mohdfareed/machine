---
# Non-container service entries. Docker containers are auto-discovered via
# homepage.* labels in their compose files.

- Machines:
    - HomeLab:
        icon: mdi-home-analytics
        href: https://homelab.{{HOMEPAGE_VAR_TAILNET_NAME}}.ts.net
        description: Home Lab server
        widget:
          type: tailscale
          deviceid: "{{HOMEPAGE_VAR_TAILSCALE_HOMELAB_DEVICE_ID}}"
          key: "{{HOMEPAGE_VAR_TAILSCALE_API_KEY}}"
          fields: ["address", "last_seen", "expires"]
    - PC:
        icon: mdi-desktop-tower
        href: https://pc.{{HOMEPAGE_VAR_TAILNET_NAME}}.ts.net
        description: Desktop PC
        widget:
          type: tailscale
          deviceid: "{{HOMEPAGE_VAR_TAILSCALE_PC_DEVICE_ID}}"
          key: "{{HOMEPAGE_VAR_TAILSCALE_API_KEY}}"
          fields: ["address", "last_seen", "expires"]
    - RPi:
        icon: mdi-raspberry-pi
        href: https://rpi.{{HOMEPAGE_VAR_TAILNET_NAME}}.ts.net
        description: Raspberry Pi
        widget:
          type: tailscale
          deviceid: "{{HOMEPAGE_VAR_TAILSCALE_RPI_DEVICE_ID}}"
          key: "{{HOMEPAGE_VAR_TAILSCALE_API_KEY}}"
          fields: ["address", "last_seen", "expires"]

- Services:
    - VS Code (HomeLab):
        icon: mdi-microsoft-visual-studio-code
        href: https://homelab.{{HOMEPAGE_VAR_TAILNET_NAME}}.ts.net/code
        description: VS Code Server
    - VS Code (RPi):
        icon: mdi-microsoft-visual-studio-code
        href: https://rpi.{{HOMEPAGE_VAR_TAILNET_NAME}}.ts.net/code
        description: VS Code Server

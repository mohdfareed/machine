# Homepage — Homelab Dashboard
# Access: https://<machine>.<tailnet>.ts.net (via machine's tailscale serve)
#
# Config files are mounted from ./config/.
# Docker integration auto-discovers running containers.

services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      - 127.0.0.1:3000:3000
    volumes:
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      HOMEPAGE_ALLOWED_HOSTS: "*"
      HOMEPAGE_VAR_TITLE: ${HOMEPAGE_TITLE:-Homepage}
      HOMEPAGE_VAR_FAVICON: ${HOMEPAGE_FAVICON:-mdi-home-analytics}
      HOMEPAGE_VAR_TAILNET_NAME: ${TAILNET_NAME}
      HOMEPAGE_VAR_TAILSCALE_API_KEY: ${TAILSCALE_API_KEY}
      HOMEPAGE_VAR_TAILSCALE_HOMELAB_DEVICE_ID: ${TAILSCALE_HOMELAB_DEVICE_ID}
      HOMEPAGE_VAR_TAILSCALE_RPI_DEVICE_ID: ${TAILSCALE_RPI_DEVICE_ID}

  ts-speedtest:
    image: tailscale/tailscale:latest
    container_name: ts-speedtest
    hostname: speedtest
    environment:
      TS_AUTHKEY: ${TS_DOCKER_AUTHKEY}
      TS_EXTRA_ARGS: --advertise-tags=tag:container
      TS_SERVE_CONFIG: /config/serve.json
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
    volumes:
      - ts-speedtest-state:/var/lib/tailscale
      - ./ts-config-speedtest:/config
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    restart: unless-stopped

  speedtest:
    image: lscr.io/linuxserver/speedtest-tracker:latest
    container_name: speedtest
    network_mode: service:ts-speedtest
    depends_on:
      - ts-speedtest
    restart: unless-stopped
    labels:
      - homepage.group=Infrastructure
      - homepage.name=Speedtest Tracker
      - homepage.icon=speedtest-tracker
      - homepage.href=https://speedtest.${TAILNET_NAME}.ts.net
      - homepage.description=Internet speed monitoring
      - homepage.widget.type=speedtest
      - homepage.widget.url=http://127.0.0.1:80
      - homepage.widget.version=2
      - homepage.widget.key=${SPEEDTEST_API_KEY:-}
      - homepage.widget.fields=["download","upload","ping"]
    volumes:
      - ./data/speedtest:/config
    environment:
      DB_CONNECTION: sqlite

volumes:
  ts-speedtest-state:
